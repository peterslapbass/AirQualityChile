name: Actualizar datos SINCA

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instalar requests
        run: pip install requests

      - name: Descargar datos SINCA
        run: |
          python - <<EOF
          import requests, json
      
          url = "https://sinca.mma.gob.cl/index.php/json/listadomapa2k19"
      
          try:
              response = requests.get(url, timeout=10)
              response.raise_for_status()
              data = response.json()
      
              with open("datos_sinca.json", "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False)
      
              print("Datos actualizados correctamente")
      
          except Exception as e:
              print("Error:", e)
              exit(1)
          EOF

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          git add datos_sinca.json
      
          if git diff --cached --quiet; then
            echo "No hay cambios"
          else
            git commit -m "Actualiza datos SINCA"
            
            git pull --rebase origin main
            
            git push origin main
          fi
              