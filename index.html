<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Dashboard Calidad del Aire Chile</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  height: 100vh;
}

#sidebar {
  width: 340px;
  background: #111;
  color: white;
  padding: 15px;
  overflow-y: auto;
}

h2 { margin-top: 0; }

.filter { margin-bottom: 10px; }

#main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#map {
  flex: 1;
}

.card {
  background: #1e1e1e;
  margin: 6px 0;
  padding: 8px;
  border-radius: 6px;
}

.alert {
  background: #330000;
  padding: 8px;
  margin: 5px 0;
  border-left: 4px solid red;
}
</style>

</head>

<body>

<div id="sidebar">
  <h2>🌫️ Aire Chile</h2>

  <select id="filter">
    <option value="ALL">Todos</option>
    <option value="MP-2,5">MP 2.5</option>
    <option value="MP-10">MP 10</option>
    <option value="NO2">NO2</option>
    <option value="CO">CO</option>
    <option value="O3">Ozono</option>
  </select>

  <h3>⚠️ Alertas</h3>
  <div id="alerts"></div>

  <h3>📊 Ranking</h3>
  <div id="ranking"></div>
</div>

<div id="main">
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- 🔥 TU JS ORIGINAL (SIN CAMBIAR NOMBRE) -->
<script src="mapa-sinca.js" defer></script>

</body>
</html>
